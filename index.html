<!doctype html>
<html lang="en">
	<head>
		<title>Login/Signup | Proxy Dating</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link href="src/app/styles/reset.css" rel="stylesheet" />
		<link href="src/app/styles/global.css" rel="stylesheet" />
		<link href="index.css" rel="stylesheet" />
		<script
			src="https://kit.fontawesome.com/fe83c3d710.js"
			crossorigin="anonymous"
		></script>
		<script src="/index.js"></script>
	</head>
	<body>
		<header>
			<div>
				<i class="fa-solid fa-heart"></i>
				<h1>Proxy<br />Dating</h1>
			</div>
		</header>
		<main>
			<section>
				<div id="login" class="">
					<form
						action="src/app/pages/match-modes/match-mode-1/match-mode-1.html"
					>
						<label for="loginEmail">Email</label>
						<input id="loginEmail" name="email" type="email" />
						<label for="loginPassword">Password</label>
						<input
							id="loginPassword"
							name="password"
							type="password"
						/>

						<input type="submit" value="Login" />
					</form>
					<button>Signup</button>
				</div>
				<div id="signup" class="hidden">
					<form
						action="src/app/pages/match-modes/match-mode-1/match-mode-1.html"
					>
						<label for="firstName">First Name</label>
						<input id="firstName" name="firstName" type="text" />
						<label for="lastName">Last Name</label>
						<input id="lastName" name="lastName" type="text" />
						<label for="age">Age</label>
						<input id="age" name="age" type="number" />
						<label for="gender">Select: </label>
						<select id="gender" name="gender">
							<option>Boy</option>
							<option>Girl</option>
						</select>
						<label for="signupEmail">Email</label>
						<input id="signupEmail" name="email" type="email" />
						<label for="signupPassword">Password</label>
						<input
							id="signupPassword"
							name="password"
							type="password"
						/>
						<label for="bio">Bio</label>
						<input id="bio" name="bio" type="text" />
						<label for="interests">Interests</label>
						<input id="interests" name="interests" type="text" />
						<label for="pfp-1">Photos</label>
						<input
							type="file"
							id="pfp-1"
							name="pfp-1"
							accept="image/png, image/jpeg"
						/>
						<input
							type="file"
							id="pfp-2"
							name="pfp-2"
							accept="image/png, image/jpeg"
						/>
						<input
							type="file"
							id="pfp-3"
							name="pfp-3"
							accept="image/png, image/jpeg"
						/>
						<input
							type="file"
							id="pfp-4"
							name="pfp-4"
							accept="image/png, image/jpeg"
						/>

						<input type="submit" value="Signup" />
					</form>
					<button>Login</button>
				</div>
			</section>
		</main>
	</body>
</html>
