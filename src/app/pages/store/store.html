<!doctype html>
<html lang="en">
	<head>
		<title>Store | Proxy Dating</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link href="../../styles/reset.css" rel="stylesheet" />
		<link href="../../styles/global.css" rel="stylesheet" />
		<link href="store.css" rel="stylesheet" />

		<script
			src="https://kit.fontawesome.com/fe83c3d710.js"
			crossorigin="anonymous"
		></script>
	</head>
	<body>
		<header>
			<div>
				<i class="fa-solid fa-heart"></i>
				<h1>Proxy<br />Dating</h1>
			</div>
			<h2>
				<span>500</span>
				<i class="fa-solid fa-coins"></i>
			</h2>
			<a href="../notifications/notifications.html">
				<i class="fa-solid fa-bell"></i>
			</a>
		</header>
		<main>
			<section id="store">
				<h1>STORE</h1>

				<div>
					<h2>Your profile will be shown to others. 10 remaining</h2>
					<button class="btn">
						<span>Show My Profile</span>
						<span>15</span>
						<i class="fa-solid fa-coins"></i>
					</button>
				</div>
				<div>
					<h2>Choose your own match.</h2>
					<a
						class="btn"
						href="../match-modes/match-mode-3/match-mode-3.html?mode=me"
					>
						<span>Pick My Match</span>
						<span>30</span>
						<i class="fa-solid fa-coins"></i>
					</a>
				</div>
			</section>
			<section id="instructions">
				<h1>HOW DOES IT WORK?</h1>

				<div>
					<h2>Pair others</h2>
					<div>
						<h2>+5</h2>
						<i class="fa-solid fa-coins"></i>
					</div>
				</div>
				<div>
					<h2>If a pair you made messages eachother</h2>
					<div>
						<h2>+1</h2>
						<i class="fa-solid fa-coins"></i>
						<h3>/msg (25 max/day/pair)</h3>
					</div>
				</div>
				<div>
					<h2>If a pair you made unmatches eachother</h2>
					<div>
						<h2>-10</h2>
						<i class="fa-solid fa-coins"></i>
					</div>
				</div>
			</section>
		</main>
		<footer>
			<a href="../match-modes/match-mode-1/match-mode-1.html"
				><i class="fa-solid fa-home"></i
			></a>
			<a href="../store/store.html"><i class="fa-solid fa-store"></i> </a>

			<a href="../messages/messages.html"
				><i class="fa-solid fa-message"></i
			></a>

			<a href="../profile-view/profile-view.html?mode=me">
				<i class="fa-solid fa-circle-user"></i>
			</a>
		</footer>
	</body>
</html>
