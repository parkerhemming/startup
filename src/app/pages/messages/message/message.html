<!doctype html>
<html lang="en">
	<head>
		<title>Message | Proxy Dating</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link href="../../../styles/reset.css" rel="stylesheet" />
		<link href="../../../styles/global.css" rel="stylesheet" />
		<link href="message.css" rel="stylesheet" />

		<script
			src="https://kit.fontawesome.com/fe83c3d710.js"
			crossorigin="anonymous"
		></script>
	</head>
	<body>
		<header>
			<a href="../messages.html" class="back-btn">
				<i class="fa-solid fa-angle-left"></i>
			</a>

			<a href="../../profile-view/profile-view.html" class="profile-link">
				<img
					src="https://randomuser.me/api/portraits/women/44.jpg"
					width="42"
					height="42"
					alt="Profile photo of Ashley"
				/>
				<h2>ASHLEY</h2>
			</a>

			<button class="unmatch-btn">
				<span>Unmatch</span>
				<span class="cost">-10 <i class="fa-solid fa-coins"></i></span>
			</button>
		</header>

		<main>
			<div class="row me"><p>Hi</p></div>
			<div class="row them"><p>Hello!</p></div>
			<div class="row me"><p>You're cool</p></div>
			<div class="row them"><p>Thx</p></div>
		</main>

		<footer>
			<form>
				<input
					id="message"
					name="message"
					type="text"
					placeholder="Message..."
					autocomplete="off"
				/>
				<button type="submit" class="send-btn">
					<i class="fa-solid fa-paper-plane"></i>
				</button>
			</form>
		</footer>
	</body>
</html>
