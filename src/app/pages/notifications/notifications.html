<!doctype html>
<html lang="en">
	<head>
		<title>Notifications | Proxy Dating</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link href="../../styles/reset.css" rel="stylesheet" />
		<link href="../../styles/global.css" rel="stylesheet" />
		<link href="notifications.css" rel="stylesheet" />

		<script
			src="https://kit.fontawesome.com/fe83c3d710.js"
			crossorigin="anonymous"
		></script>
	</head>
	<body>
		<header>
			<a href="javascript:history.back()">
				<i class="fa-solid fa-xmark"></i>
			</a>
		</header>
		<main>
			<section>
				<div class="row">
					<p>
						A pair you made messaged eachother over 25 times today!
					</p>
					<p><span>+25</span><i class="fa-solid fa-coins"></i></p>
					<p>2 hours ago</p>
				</div>
				<div class="row">
					<p>A pair you made messaged eachother 7 times today!</p>
					<p><span>+7</span><i class="fa-solid fa-coins"></i></p>
					<p>2 hours ago</p>
				</div>
				<div class="row">
					<p>A pair you made unmatched eachother :/</p>
					<p><span>-10</span><i class="fa-solid fa-coins"></i></p>
					<p>1 hour ago</p>
				</div>
				<div class="row">
					<p>You got a match!</p>
					<a href="../messages/message/message.html?user=Jane%20Doe">
						<i class="fa-solid fa-message"></i>
					</a>
					<p>10 mins ago</p>
				</div>
			</section>
		</main>
	</body>
</html>
